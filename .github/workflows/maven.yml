name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test with Maven
      # Dòng này trỏ vào file pom.xml của dự án Java
      run: mvn -B test --file JavaMaven-LamTanHung-110123015/pom.xml